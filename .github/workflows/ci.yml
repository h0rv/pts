name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig fmt --check build.zig src tests
      - run: zig build test
      - run: zig build -Doptimize=ReleaseFast

  cross-build:
    runs-on: ubuntu-24.04
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
          - target: aarch64-linux
          - target: x86_64-macos
          - target: aarch64-macos
          - target: x86_64-windows
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast
